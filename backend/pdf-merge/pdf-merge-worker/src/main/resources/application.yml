spring:
  application:
    name: pdf-merge-worker
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/pdf_toolkit?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: 123$%^abc
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      timeout: 3s
mybatis:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
  type-aliases-package: com.company.pdfmerge.common.entity

server:
  port: 0
pdfmerge:
  storage:
    root-dir: /data/pdf-merge
  queue:
    stream-key: stream:pdf:merge:task
    dlq-stream-key: stream:pdf:merge:task:dlq
    consumer-group: merge_worker_group
    consumer-name: worker-local
    read-count: 10
    block-ms: 2000
    max-retry: 2
