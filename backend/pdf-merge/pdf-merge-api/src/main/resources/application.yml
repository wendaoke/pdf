spring:
  application:
    name: pdf-merge-api
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/pdf_toolkit?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: 123$%^abc
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      password: 123$%^abc
      timeout: 3s
mybatis:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
  type-aliases-package: com.company.pdfmerge.common.entity

server:
  port: 8080
  tomcat:
    max-http-post-size: 52MB
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
pdfmerge:
  limits:
    n-files: 20
    s-single-bytes: 52428800
    s-total-bytes: 209715200
  storage:
    root-dir: /data/pdf-merge
  queue:
    stream-key: stream:pdf:merge:task
    dlq-stream-key: stream:pdf:merge:task:dlq
    consumer-group: merge_worker_group
    consumer-name: local-worker
    read-count: 10
    block-ms: 2000
    max-retry: 2
  download:
    token-expire-minutes: 15
  merge:
    timeout-seconds: 120
